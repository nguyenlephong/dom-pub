    </style>
  </defs>
  <rect width="1440" height="960" fill="url(#bg)"/><rect width="1440" height="960" fill="url(#grid)" opacity=".55"/>
  <circle cx="1296" cy="76.8" r="172.79999999999998" fill="#d6eaed" opacity=".55"/><circle cx="57.6" cy="902.4" r="129.6" fill="#d6eaed" opacity=".38"/>
