<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Write data and intent together</title><desc id="desc">A relay publishes after the transaction is durable</desc>
