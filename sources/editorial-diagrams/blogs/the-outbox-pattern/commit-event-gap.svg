<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The dangerous gap</title><desc id="desc">A database commit can succeed while the event disappears</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8f1f5"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#eedce6" stroke-width="1" opacity=".55"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#402839" flood-opacity=".11"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#826d7b"/></marker>
    <style>
      .headline{font:700 64px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#402839;letter-spacing:-1px}.subtitle{font:400 28px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#826d7b}.eyebrow{font:700 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#9b4f75;letter-spacing:3px}.cardTitle,.nodeTitle{font:700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#402839}.cardBody{font:500 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#826d7b}.tiny,.pill{font:600 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#826d7b;letter-spacing:.5px}.pill{fill:#9b4f75}.white{fill:white}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)" opacity=".55"/>
  <circle cx="1440" cy="72" r="192" fill="#eedce6" opacity=".55"/><circle cx="64" cy="846" r="144" fill="#eedce6" opacity=".38"/>
  <text x="120" y="94.5" class="eyebrow">EDITORIAL DIAGRAM</text>
  <text x="120" y="184.5" class="headline">The dangerous gap</text>
  <text x="120" y="238.5" class="subtitle">A database commit can succeed while the event disappears</text>
  <g><rect x="143" y="432" width="300" height="150" rx="28" fill="#fff" stroke="#eedce6" stroke-width="3" filter="url(#shadow)"/><rect x="143" y="432" width="12" height="150" rx="6" fill="#9b4f75"/><text x="181" y="490" class="cardTitle">Write order</text><text x="181" y="530" class="cardBody">failure window</text></g><path d="M 450 507 L 473 507" fill="none" stroke="#826d7b" stroke-width="5"  marker-end="url(#arrow)"/><g><rect x="481" y="432" width="300" height="150" rx="28" fill="#fff" stroke="#eedce6" stroke-width="3" filter="url(#shadow)"/><rect x="481" y="432" width="12" height="150" rx="6" fill="#9b4f75"/><text x="519" y="490" class="cardTitle">DB commit</text></g><path d="M 788 507 L 811 507" fill="none" stroke="#826d7b" stroke-width="5"  marker-end="url(#arrow)"/><g><rect x="819" y="432" width="300" height="150" rx="28" fill="#fff" stroke="#eedce6" stroke-width="3" filter="url(#shadow)"/><rect x="819" y="432" width="12" height="150" rx="6" fill="#9b4f75"/><text x="857" y="490" class="cardTitle">Publish event</text></g><path d="M 1126 507 L 1149 507" fill="none" stroke="#826d7b" stroke-width="5" stroke-dasharray="14 12" marker-end="url(#arrow)"/><g><rect x="1157" y="432" width="300" height="150" rx="28" fill="#fff" stroke="#eedce6" stroke-width="3" filter="url(#shadow)"/><rect x="1157" y="432" width="12" height="150" rx="6" fill="#b94b59"/><text x="1195" y="490" class="cardTitle">Lost</text></g>
  </svg>