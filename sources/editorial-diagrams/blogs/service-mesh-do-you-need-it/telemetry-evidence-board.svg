<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Repeated signals, not fashion</title><desc id="desc">Latency, errors and missing traces make the case</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef7f8"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#d6eaed" stroke-width="1" opacity=".55"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#15323b" flood-opacity=".11"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5c7480"/></marker>
    <style>
      .headline{font:700 58px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#15323b;letter-spacing:-1px}.subtitle{font:400 25px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#5c7480}.eyebrow{font:700 14px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0d7a86;letter-spacing:3px}.cardTitle,.nodeTitle{font:700 20px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#15323b}.cardBody{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#5c7480}.tiny,.pill{font:600 14px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#5c7480;letter-spacing:.5px}.pill{fill:#0d7a86}.white{fill:white}
    </style>
  </defs>
  <rect width="1440" height="960" fill="url(#bg)"/><rect width="1440" height="960" fill="url(#grid)" opacity=".55"/>
  <circle cx="1296" cy="76.8" r="172.79999999999998" fill="#d6eaed" opacity=".55"/><circle cx="57.6" cy="902.4" r="129.6" fill="#d6eaed" opacity=".38"/>
  <text x="108" y="100.8" class="eyebrow">EDITORIAL DIAGRAM</text>
  <text x="108" y="196.79999999999998" class="headline">Repeated signals, not fashion</text>
  <text x="108" y="254.4" class="subtitle">Latency, errors and missing traces make the case</text>
  <g><path d="M 453.35999999999996 475.584 C 512.56 419.03999999999996, 571.76 497.472, 648.72 431.808" fill="none" stroke="#0d7a86" stroke-width="8" stroke-linecap="round"/><rect x="110" y="355.2" width="592" height="182.4" rx="28" fill="#fff" stroke="#d6eaed" stroke-width="3" filter="url(#shadow)"/><rect x="110" y="355.2" width="12" height="182.4" rx="6" fill="#0d7a86"/><text x="148" y="413.2" class="cardTitle">p95 latency</text><text x="148" y="453.2" class="cardBody">840 ms</text></g><g><path d="M 1081.36 475.584 C 1140.56 419.03999999999996, 1199.76 497.472, 1276.72 431.808" fill="none" stroke="#0d7a86" stroke-width="8" stroke-linecap="round"/><rect x="738" y="355.2" width="592" height="182.4" rx="28" fill="#fff" stroke="#d6eaed" stroke-width="3" filter="url(#shadow)"/><rect x="738" y="355.2" width="12" height="182.4" rx="6" fill="#0d7a86"/><text x="776" y="413.2" class="cardTitle">error rate</text><text x="776" y="453.2" class="cardBody">2.8%</text></g><g><path d="M 453.35999999999996 691.984 C 512.56 635.44, 571.76 713.8720000000001, 648.72 648.2080000000001" fill="none" stroke="#c84f55" stroke-width="8" stroke-linecap="round"/><rect x="110" y="571.6" width="592" height="182.4" rx="28" fill="#fff" stroke="#d6eaed" stroke-width="3" filter="url(#shadow)"/><rect x="110" y="571.6" width="12" height="182.4" rx="6" fill="#0d7a86"/><text x="148" y="629.6" class="cardTitle">trace gaps</text><text x="148" y="669.6" class="cardBody">17%</text></g><g><path d="M 1081.36 691.984 C 1140.56 635.44, 1199.76 713.8720000000001, 1276.72 648.2080000000001" fill="none" stroke="#0d7a86" stroke-width="8" stroke-linecap="round"/><rect x="738" y="571.6" width="592" height="182.4" rx="28" fill="#fff" stroke="#d6eaed" stroke-width="3" filter="url(#shadow)"/><rect x="738" y="571.6" width="12" height="182.4" rx="6" fill="#e59b45"/><text x="776" y="629.6" class="cardTitle">mTLS coverage</text><text x="776" y="669.6" class="cardBody">42%</text></g>
