<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Merge while the change is small</title><desc id="desc">Short branches keep integration debt visible</desc>
