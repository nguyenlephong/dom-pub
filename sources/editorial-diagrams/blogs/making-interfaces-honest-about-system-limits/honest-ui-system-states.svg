<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Show the system you actually have</title><desc id="desc">Slow, partial and failed are real product states</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f3f5f7"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#dde8f0" stroke-width="1" opacity=".55"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1f2d39" flood-opacity=".11"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#687987"/></marker>
    <style>
      .headline{font:700 64px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#1f2d39;letter-spacing:-1px}.subtitle{font:400 28px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#687987}.eyebrow{font:700 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#3b6f9a;letter-spacing:3px}.cardTitle,.nodeTitle{font:700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#1f2d39}.cardBody{font:500 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#687987}.tiny,.pill{font:600 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#687987;letter-spacing:.5px}.pill{fill:#3b6f9a}.white{fill:white}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)" opacity=".55"/>
  <circle cx="1440" cy="72" r="192" fill="#dde8f0" opacity=".55"/><circle cx="64" cy="846" r="144" fill="#dde8f0" opacity=".38"/>
  <text x="120" y="94.5" class="eyebrow">EDITORIAL DIAGRAM</text>
  <text x="120" y="184.5" class="headline">Show the system you actually have</text>
  <text x="120" y="238.5" class="subtitle">Slow, partial and failed are real product states</text>
  <g><circle cx="698" cy="415" r="18" fill="#3b6f9a" opacity=".9"/><rect x="192" y="360" width="560" height="162" rx="28" fill="#fff" stroke="#dde8f0" stroke-width="3" filter="url(#shadow)"/><rect x="192" y="360" width="12" height="162" rx="6" fill="#3b6f9a"/><text x="230" y="418" class="cardTitle">Ready</text><text x="230" y="458" class="cardBody">01</text></g><g><circle cx="1354" cy="415" r="18" fill="#df9b4d" opacity=".9"/><rect x="848" y="360" width="560" height="162" rx="28" fill="#fff" stroke="#dde8f0" stroke-width="3" filter="url(#shadow)"/><rect x="848" y="360" width="12" height="162" rx="6" fill="#df9b4d"/><text x="886" y="418" class="cardTitle">Slow</text><text x="886" y="458" class="cardBody">02</text></g><g><circle cx="698" cy="649" r="18" fill="#687987" opacity=".9"/><rect x="192" y="594" width="560" height="162" rx="28" fill="#fff" stroke="#dde8f0" stroke-width="3" filter="url(#shadow)"/><rect x="192" y="594" width="12" height="162" rx="6" fill="#687987"/><text x="230" y="652" class="cardTitle">Partial</text><text x="230" y="692" class="cardBody">03</text></g><g><circle cx="1354" cy="649" r="18" fill="#c65353" opacity=".9"/><rect x="848" y="594" width="560" height="162" rx="28" fill="#fff" stroke="#dde8f0" stroke-width="3" filter="url(#shadow)"/><rect x="848" y="594" width="12" height="162" rx="6" fill="#c65353"/><text x="886" y="652" class="cardTitle">Failed</text><text x="886" y="692" class="cardBody">04</text></g>
  </svg>