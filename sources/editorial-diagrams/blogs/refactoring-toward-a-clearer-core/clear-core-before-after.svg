<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Pull the core into view</title><desc id="desc">Refactor dependency direction, not just filenames</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f3f1fa"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="#e3dff4" stroke-width="1" opacity=".55"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#26233f" flood-opacity=".11"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6e6986"/></marker>
    <style>
      .headline{font:700 64px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#26233f;letter-spacing:-1px}.subtitle{font:400 28px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6e6986}.eyebrow{font:700 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#5d55b8;letter-spacing:3px}.cardTitle,.nodeTitle{font:700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#26233f}.cardBody{font:500 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6e6986}.tiny,.pill{font:600 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6e6986;letter-spacing:.5px}.pill{fill:#5d55b8}.white{fill:white}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)" opacity=".55"/>
  <circle cx="1440" cy="72" r="192" fill="#e3dff4" opacity=".55"/><circle cx="64" cy="846" r="144" fill="#e3dff4" opacity=".38"/>
  <text x="120" y="94.5" class="eyebrow">EDITORIAL DIAGRAM</text>
  <text x="120" y="184.5" class="headline">Pull the core into view</text>
  <text x="120" y="238.5" class="subtitle">Refactor dependency direction, not just filenames</text>
  <rect x="110" y="333" width="432" height="342" rx="34" fill="#fff" stroke="#e3dff4" stroke-width="3" filter="url(#shadow)"/><circle cx="168" cy="395" r="23" fill="#5d55b8"/><text x="208" y="405" class="nodeTitle">Tangled edges</text><path d="M 158 488 C 261.2 438, 360.55999999999995 563, 497 498" fill="none" stroke="#5d55b8" stroke-width="9" stroke-linecap="round"/><line x1="162" y1="578" x2="490" y2="578" stroke="#e3dff4" stroke-width="12" stroke-linecap="round"/><line x1="162" y1="623" x2="421.03999999999996" y2="623" stroke="#e3dff4" stroke-width="12" stroke-linecap="round"/><text x="158" y="639" class="tiny">before</text><rect x="584" y="333" width="432" height="342" rx="34" fill="#fff" stroke="#e3dff4" stroke-width="3" filter="url(#shadow)"/><circle cx="642" cy="395" r="23" fill="#5d55b8"/><text x="682" y="405" class="nodeTitle">Clear core</text><path d="M 632 488 C 735.2 438, 834.56 563, 971 498" fill="none" stroke="#5d55b8" stroke-width="9" stroke-linecap="round"/><line x1="636" y1="578" x2="964" y2="578" stroke="#e3dff4" stroke-width="12" stroke-linecap="round"/><line x1="636" y1="623" x2="895.04" y2="623" stroke="#e3dff4" stroke-width="12" stroke-linecap="round"/><text x="632" y="639" class="tiny">after</text><rect x="1058" y="333" width="432" height="342" rx="34" fill="#fff" stroke="#e3dff4" stroke-width="3" filter="url(#shadow)"/><circle cx="1116" cy="395" r="23" fill="#d48a47"/><text x="1156" y="405" class="nodeTitle">Adapters outside</text><path d="M 1106 488 C 1209.2 438, 1308.56 563, 1445 498" fill="none" stroke="#d48a47" stroke-width="9" stroke-linecap="round"/><line x1="1110" y1="578" x2="1438" y2="578" stroke="#e3dff4" stroke-width="12" stroke-linecap="round"/><line x1="1110" y1="623" x2="1369.04" y2="623" stroke="#e3dff4" stroke-width="12" stroke-linecap="round"/>
  </svg>