  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)" opacity=".55"/>
  <circle cx="1440" cy="72" r="192" fill="#dde8f0" opacity=".55"/><circle cx="64" cy="846" r="144" fill="#dde8f0" opacity=".38"/>
